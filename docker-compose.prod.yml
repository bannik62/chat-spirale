# Production — utiliser avec `.env.prod` sur le VPS (secrets injectés par GitHub Actions).
# Exemple : docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      DEV_SEED: ${DEV_SEED:-0}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - '127.0.0.1:${SPIRALE_HTTP_PORT:-8080}:80'
    depends_on:
      - backend

volumes:
  postgres_data:
