services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spirale
      POSTGRES_PASSWORD: spirale
      POSTGRES_DB: spirale
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spirale']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://spirale:spirale@postgres:5432/spirale
      JWT_SECRET: dev-secret-change-me
      ADMIN_EMAIL: admin@spirale.local
      ADMIN_PASSWORD: admin123
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  postgres_data:
